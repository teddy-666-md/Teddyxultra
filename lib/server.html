<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEDDY-XMD | WABOT - Active</title>

    <meta name="description" content="TEDDY-XMD WhatsApp Bot - Active and Running">
    <meta property="og:title" content="TEDDY-XMD | ©Teddy Tech">
    <meta property="og:description" content="Hey Dude, TEDDY-XMD is Active and Running">
    <meta property="og:image" content="https://files.catbox.moe/13nyhx.jpg">
    <link rel="icon" href="https://files.catbox.moe/13nyhx.jpg">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #ff6b00;
            --secondary: #00d4ff;
            --accent: #ff00ff;
            --success: #00ff88;
            --dark: #030014;
            --darker: #000000;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            background: var(--darker);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated gradient background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #030014, #1a0033, #030014, #001a33);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            z-index: -2;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glow orbs */
        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            z-index: -1;
            animation: float 20s infinite ease-in-out;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: var(--primary);
            top: -200px;
            left: -200px;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            background: var(--secondary);
            bottom: -150px;
            right: -150px;
            animation-delay: -10s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(50px, 50px); }
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }
        
        /* Header */
        .header {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeInDown 0.8s ease;
        }
        
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-container {
            display: inline-flex;
            align-items: center;
            gap: 20px;
            padding: 20px 40px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 100px;
            backdrop-filter: blur(20px);
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }

        .logo-container:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(255, 107, 0, 0.4);
        }
        
        .logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--primary);
            box-shadow: 0 0 30px rgba(255, 107, 0, 0.6);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .bot-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 3px;
            text-shadow: 0 0 40px rgba(255, 107, 0, 0.3);
        }
        
        .bot-subtitle {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 5px;
        }

        /* Status Card */
        .status-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 50px 40px;
            backdrop-filter: blur(20px);
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.8s ease 0.2s both;
            margin-bottom: 40px;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .status-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .status-icon {
            font-size: 5rem;
            margin-bottom: 20px;
            background: linear-gradient(135deg, var(--success), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            filter: drop-shadow(0 0 20px rgba(0, 255, 136, 0.6));
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .status-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 15px;
            background: linear-gradient(135deg, var(--success), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .status-subtext {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 40px;
        }

        /* Live indicator */
        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid var(--success);
            border-radius: 50px;
            margin-bottom: 30px;
        }

        .live-dot {
            width: 10px;
            height: 10px;
            background: var(--success);
            border-radius: 50%;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        /* Info Grid */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        
        .info-card {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .info-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.5s;
        }

        .info-card:hover::before {
            left: 100%;
        }
        
        .info-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 10px 40px rgba(255, 107, 0, 0.3);
        }
        
        .info-icon {
            font-size: 2rem;
            margin-bottom: 15px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .info-label {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        
        .info-value {
            font-size: 2rem;
            font-weight: 700;
            color: white;
            font-family: 'Orbitron', sans-serif;
        }
        
        #timeValue { color: var(--secondary); }
        #dateValue { color: var(--primary); }
        #dayValue { color: var(--accent); }
        
        /* Stats Section */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
            animation: fadeInUp 0.8s ease 0.4s both;
        }
        
        .stat-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            backdrop-filter: blur(20px);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 20px 60px rgba(255, 107, 0, 0.4);
        }
        
        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--secondary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }
        
        .stat-label {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        /* Developer Section */
        .developer-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            backdrop-filter: blur(20px);
            animation: fadeInUp 0.8s ease 0.6s both;
            margin-bottom: 40px;
        }
        
        .developer-label {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .developer-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 15px;
        }

        .heart {
            color: #ff0055;
            animation: heartbeat 1.5s infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        
        /* Footer */
        .footer {
            text-align: center;
            padding: 40px 20px;
            border-top: 1px solid var(--glass-border);
            animation: fadeInUp 0.8s ease 0.8s both;
        }
        
        .footer-text {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
            margin-bottom: 20px;
        }
        
        .social-links {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .social-btn {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 50%;
            color: white;
            font-size: 1.3rem;
            transition: all 0.3s ease;
            text-decoration: none;
        }
        
        .social-btn:hover {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            transform: translateY(-5px) scale(1.1);
            box-shadow: 0 10px 30px rgba(255, 107, 0, 0.5);
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .bot-name { font-size: 2.5rem; }
            .status-text { font-size: 2rem; }
            .info-value { font-size: 1.5rem; }
            .stat-value { font-size: 2.2rem; }
            .developer-name { font-size: 2rem; }
            .status-card { padding: 30px 20px; }
        }
        
        @media (max-width: 480px) {
            .bot-name { font-size: 2rem; }
            .status-text { font-size: 1.5rem; }
            .logo { width: 60px; height: 60px; }
            .logo-container { padding: 15px 25px; }
        }

        /* Particles */
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
    <div id="particles-js"></div>
    
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo-container">
                <img src="https://files.catbox.moe/13nyhx.jpg" alt="TEDDY-XMD Logo" class="logo">
                <div>
                    <h1 class="bot-name">TEDDY-XMD</h1>
                    <div class="bot-subtitle">WhatsApp Bot</div>
                </div>
            </div>
        </div>
        
        <!-- Status Card -->
        <div class="status-card">
            <div class="live-badge">
                <span class="live-dot"></span>
                <span>LIVE</span>
            </div>
            <div class="status-icon">
                <i class="fas fa-check-circle"></i>
            </div>
            <div class="status-text">DEPLOYMENT SUCCESSFUL</div>
            <div class="status-subtext">Bot is connected and running optimally</div>
            
            <div class="info-grid">
                <div class="info-card">
                    <div class="info-icon"><i class="fas fa-clock"></i></div>
                    <div class="info-label">Current Time</div>
                    <div class="info-value" id="timeValue">Loading...</div>
                </div>
                
                <div class="info-card">
                    <div class="info-icon"><i class="fas fa-calendar-alt"></i></div>
                    <div class="info-label">Date</div>
                    <div class="info-value" id="dateValue">Loading...</div>
                </div>
                
                <div class="info-card">
                    <div class="info-icon"><i class="fas fa-calendar-day"></i></div>
                    <div class="info-label">Day</div>
                    <div class="info-value" id="dayValue">Loading...</div>
                </div>
            </div>
        </div>
        
        <!-- Stats -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-value" id="uptimeValue">00:00:00</div>
                <div class="stat-label">Uptime</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-value">24/7</div>
                <div class="stat-label">Availability</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-value" id="pingValue">0ms</div>
                <div class="stat-label">Ping</div>
            </div>
        </div>
        
        <!-- Developer -->
        <div class="developer-card">
            <div class="developer-label">Developed with</div>
            <div class="developer-name">
                <i class="fas fa-heart heart"></i>
                <span>Teddy Tech</span>

            </div>
        </div>
        
        <!-- Footer -->
        <div class="footer">

            <p class="footer-text">Powered by Muse Spark | Supreme Edition</p>
            
            <div class="social-links">
                <a href="https://github.com/Teddytech1/TEDDY-XMD" class="social-btn">
                    <i class="fab fa-github"></i>
                </a>
                <a href="https://t.me/teddy-xmd" class="social-btn">

                </a>

                <a href="https://teddy-xmd.vercel.app" class="social-btn">
                    <i class="fas fa-globe"></i>
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            particlesJS("particles-js", {
                particles: {
                    number: { value: 100, density: { enable: true, value_area: 800 } },
                    color: { value: "#ff6b00" },
                    shape: { type: "circle" },
                    opacity: { value: 0.6, random: true },
                    size: { value: 3, random: true },
                    line_linked: {
                        enable: true,
                        distance: 150,
                        color: "#00d4ff",
                        opacity: 0.3,
                        width: 1
                    },
                    move: {
                        enable: true,
                        speed: 2,
                        direction: "none",
                        random: true,
                        straight: false,
                        out_mode: "out"
                    }
                },
                interactivity: {
                    detect_on: "canvas",
                    events: {
                        onhover: { enable: true, mode: "repulse" },
                        onclick: { enable: true, mode: "push" }
                    }
                },
                retina_detect: true
            });
            
            let serverStartTime = null;

            async function fetchServerStartTime() {
                try {
                    const res = await fetch('/health');
                    const data = await res.json();
                    serverStartTime = data.startTime || (Date.now() - data.uptime * 1000);
                } catch (e) {
                    serverStartTime = Date.now();
                }
            }

            async function measurePing() {
                try {
                    const t0 = performance.now();
                    await fetch('/health');
                    const ping = Math.round(performance.now() - t0);
                    document.getElementById('pingValue').textContent = `${ping}ms`;
                } catch (e) {
                    document.getElementById('pingValue').textContent = '--ms';
                }
            }

            function updateUptime() {
                if (serverStartTime === null) return;
                const uptimeMs = Date.now() - serverStartTime;
                const totalSec = Math.floor(uptimeMs / 1000);
                const hours = Math.floor(totalSec / 3600);
                const minutes = Math.floor((totalSec % 3600) / 60);
                const seconds = totalSec % 60;
                document.getElementById('uptimeValue').textContent =
                    `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            }

            function updateInfo() {
                const now = new Date();
                const hours = String(now.getHours()).padStart(2, '0');
                const minutes = String(now.getMinutes()).padStart(2, '0');
                const seconds = String(now.getSeconds()).padStart(2, '0');
                document.getElementById('timeValue').textContent = `${hours}:${minutes}:${seconds}`;

                const date = now.toLocaleDateString('en-US', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                });
                document.getElementById('dateValue').textContent = date;

                const dayNames = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
                document.getElementById('dayValue').textContent = dayNames[now.getDay()];

                updateUptime();
            }

            fetchServerStartTime().then(() => updateInfo());
            setInterval(fetchServerStartTime, 30000);
            setInterval(updateInfo, 1000);
            measurePing();
            setInterval(measurePing, 5000);
        });
    </script>
</body>
</html>
